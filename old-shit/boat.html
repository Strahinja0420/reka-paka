<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reka Paka – Boat Ride</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif}
#hud{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);color:#fff;font-family:monospace;font-size:13px;background:rgba(0,0,0,.55);padding:10px 22px;border-radius:24px;white-space:nowrap;backdrop-filter:blur(6px);z-index:10;border:1px solid rgba(255,255,255,.12)}
#mode-toggle{position:fixed;top:16px;right:16px;z-index:10;display:flex;gap:6px}
#mode-toggle button{background:rgba(0,0,0,.5);color:#fff;border:1px solid rgba(255,255,255,.2);padding:8px 16px;border-radius:20px;font-size:12px;cursor:pointer;font-family:monospace;backdrop-filter:blur(6px);transition:all .2s}
#mode-toggle button:hover{background:rgba(255,255,255,.15)}
#mode-toggle button.active{background:rgba(60,140,200,.6);border-color:rgba(100,180,240,.5)}
#vr-btn{position:fixed;top:16px;left:16px;z-index:10;background:rgba(0,0,0,.5);color:#fff;border:1px solid rgba(255,255,255,.2);padding:8px 16px;border-radius:20px;font-size:12px;cursor:pointer;font-family:monospace;backdrop-filter:blur(6px);display:none}
#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:12px;height:12px;pointer-events:none;z-index:5}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,255,255,.5)}
#crosshair::before{width:2px;height:12px;left:5px;top:0}
#crosshair::after{width:12px;height:2px;top:5px;left:0}
#loading{position:fixed;inset:0;background:#0a1520;display:flex;align-items:center;justify-content:center;flex-direction:column;color:#fff;font-family:monospace;z-index:100}
#loading .bar{width:240px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin-top:16px}
#loading .fill{height:100%;background:#4a9edd;border-radius:2px;width:0%;transition:width .3s}
</style>
</head>
<body>
<div id="loading"><div>Loading Reka Paka terrain…</div><div class="bar"><div class="fill" id="load-fill"></div></div></div>
<div id="hud">Loading...</div>
<div id="crosshair"></div>
<div id="mode-toggle">
  <button id="btn-boat" class="active" onclick="setMode('boat')">⛵ Boat</button>
  <button id="btn-walk" onclick="setMode('walk')">🚶 Walk</button>
</div>
<button id="vr-btn" onclick="enterVR()">🥽 Enter VR</button>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="terrain_mesh.js"></script>
<script src="pointcloud.js"></script>

(function poll(){
  if(typeof THREE==='undefined'||typeof MESH_VERTS==='undefined'||typeof PC_DATA==='undefined'){document.getElementById('load-fill').style.width='30%';setTimeout(poll,50);return}
  document.getElementById('load-fill').style.width='60%';setTimeout(init,80);
})();

function decode(b64){var bin=atob(b64),ab=new ArrayBuffer(bin.length),u8=new Uint8Array(ab);for(var i=0;i<bin.length;i++)u8[i]=bin.charCodeAt(i);return ab}

var renderer,scene,camera,cameraRig,waterMesh,hmap={},mode='boat',keys={},yaw=0,pitch=-0.05,locked=false,clock,xrSession=null,isDragging=false;

// Actual river path from terrain analysis (diagonal: NW to SE)
var RP=[
  {x:-135,z:110,y:1.34},{x:-134,z:108,y:1.31},{x:-135,z:105,y:1.3},{x:-135,z:102,y:1.25},

  {x:-120,z:85,y:1.0},{x:-105,z:84,y:0.8},{x:-90,z:83,y:0.6},{x:-80,z:82,y:-0.5},
  {x:-75,z:80,y:-0.58},{x:-72,z:78,y:-0.4},{x:-70,z:76,y:-0.11},

for(var pass=0;pass<4;pass++)for(var i=1;i<RP.length-1;i++){
  RP[i].x=RP[i-1].x*.25+RP[i].x*.5+RP[i+1].x*.25;
  RP[i].y=RP[i-1].y*.25+RP[i].y*.5+RP[i+1].y*.25;
}

var boatT=0,boatSpeed=.015,boatSteer=0;

function pathPt(t){t=Math.max(0,Math.min(1,t));var idx=t*(RP.length-1),i0=Math.floor(idx),i1=Math.min(i0+1,RP.length-1),f=idx-i0;return{x:RP[i0].x*(1-f)+RP[i1].x*f,z:RP[i0].z*(1-f)+RP[i1].z*f,y:RP[i0].y*(1-f)+RP[i1].y*f}}
function pathDir(t){var a=pathPt(Math.max(0,t-.01)),b=pathPt(Math.min(1,t+.01)),dx=b.x-a.x,dz=b.z-a.z,l=Math.sqrt(dx*dx+dz*dz)||1;return{x:dx/l,z:dz/l}}

window.setMode=function(m){
  mode=m;
  document.getElementById('btn-boat').className=m==='boat'?'active':'';
  document.getElementById('btn-walk').className=m==='walk'?'active':'';
  document.getElementById('crosshair').style.display=m==='walk'?'':'none';
  var bo=scene.getObjectByName('boat');
  if(m==='boat'){
    boatT=0;boatSteer=0;var d=pathDir(0);yaw=Math.atan2(d.x,d.z);pitch=-.05;
    if(bo)bo.visible=true;
  }else{
    // Start on the bank near center of map (0,0 has terrain)
    cameraRig.position.set(10,3,0);yaw=Math.PI*.75;pitch=0;
    if(bo)bo.visible=false;
  }
  updateHUD();
};

function updateHUD(){
  var e=document.getElementById('hud');
  if(mode==='boat')e.textContent='⛵ Boat  ·  W/S = speed  ·  A/D = steer  ·  Drag = look';
  else e.textContent=locked?'WASD = move  ·  Shift = run  ·  Mouse = look  ·  ESC = unlock':'Click to lock mouse  ·  WASD = move';
}

  sun.shadow.mapSize.set(1024,1024);
  sun.shadow.camera.left=-160;sun.shadow.camera.right=160;
  sun.shadow.camera.top=160;sun.shadow.camera.bottom=-160;
  sun.shadow.camera.far=350;scene.add(sun);

    uniforms:{top:{value:new THREE.Color(0x1a4580)},bot:{value:new THREE.Color(0x6a9cbc)}},
    vertexShader:'varying vec3 vP;void main(){vP=position;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}',
    fragmentShader:'uniform vec3 top,bot;varying vec3 vP;void main(){float h=clamp((vP.y+10.)/240.,0.,1.);gl_FragColor=vec4(mix(bot,top,h*h),1.);}'
  })));

  // Clouds
  var cm=new THREE.MeshLambertMaterial({color:0xffffff,transparent:true,opacity:.65});
  for(var ci=0;ci<14;ci++){
    var g=new THREE.Group();
    [[0,0,0,4+Math.random()*2,1.8,3.5],[3,.4,0,3,1.4,2.5],[-3,.3,0,2.8,1.3,2.3]].forEach(function(p){
      var s=new THREE.Mesh(new THREE.SphereGeometry(1,6,4),cm);
      s.position.set(p[0],p[1],p[2]);s.scale.set(p[3],p[4],p[5]);g.add(s);
    });
    g.position.set((Math.random()-.5)*300,30+Math.random()*20,(Math.random()-.5)*260);
    g.userData.speed=(Math.random()-.5)*.3;scene.add(g);
  }

  // ── Terrain ───────────────────────────────────────────────────────
  var verts=new Float32Array(decode(MESH_VERTS));
  var cB=new Uint8Array(decode(MESH_COLORS));
  var faces=new Uint32Array(decode(MESH_FACES));
  var n=MESH_VERT_COUNT;

  // Colors: subtle enhancement, overall darker
  var colors=new Float32Array(n*3);
  for(var i=0;i<n;i++){
    var r=cB[i*3]/255,g=cB[i*3+1]/255,b=cB[i*3+2]/255;
    var l=(Math.max(r,g,b)+Math.min(r,g,b))/2;
    r=l+(r-l)*1.2;g=l+(g-l)*1.2;b=l+(b-l)*1.2;

    if(g>r&&g>b)g+=.012;

    colors[i*3+1]=Math.max(0,Math.min(1,g));

  var tm=new THREE.Mesh(geo,new THREE.MeshLambertMaterial({vertexColors:true,side:THREE.DoubleSide}));
  tm.receiveShadow=true;scene.add(tm);

    var key=vx+','+vz;if(!(key in hmap)||hmap[key]<vy)hmap[key]=vy;

  waterNormalTex.magFilter=THREE.LinearFilter;
  waterNormalTex.minFilter=THREE.LinearMipmapLinearFilter;

  var WATER_Y=0.4; // uniform water level

  var wm=new THREE.ShaderMaterial({
    transparent:true,
    uniforms:{

      uNormal:{value:waterNormalTex},
      uSunDir:{value:new THREE.Vector3(0.5,0.7,0.3).normalize()},

      '  vec3 p=position;',

      'uniform sampler2D uNormal;',
      'uniform vec3 uSunDir,uWaterColor,uDeepColor,uSkyColor;',
      'varying vec2 vUv;',
      'varying vec3 vWorldPos;',
      'varying float vWave;',

      '  vec2 uv2=vWorldPos.xz*0.06+vec2(-uTime*0.015,uTime*0.025);',
      '  vec3 n1=texture2D(uNormal,uv1).rgb*2.-1.;',
      '  vec3 n2=texture2D(uNormal,uv2).rgb*2.-1.;',
      '  vec3 norm=normalize(vec3((n1.xy+n2.xy)*.5,1.));',
      '  float diffuse=max(dot(norm,uSunDir),0.);',
      '  vec3 viewDir=normalize(cameraPosition-vWorldPos);',
      '  vec3 halfDir=normalize(uSunDir+viewDir);',
      '  float spec=pow(max(dot(norm,halfDir),0.),120.)*.7;',
      '  float fresnel=pow(1.-max(dot(viewDir,vec3(0.,1.,0.)),0.),3.);',
      '  fresnel=clamp(fresnel,.15,.85);',
      '  vec3 water=mix(uDeepColor,uWaterColor,diffuse*.6+.4);',
      '  water=mix(water,uSkyColor,fresnel*.4);',
      '  water+=vec3(1.,.95,.85)*spec;',
      '  float foam=smoothstep(.06,.12,vWave);',
      '  water=mix(water,vec3(.75,.85,.88),foam*.3);',
      '  gl_FragColor=vec4(water,.8);',
      '}'

  waterMesh=new THREE.Mesh(waterGeo,wm);
  waterMesh.position.set(0,WATER_Y,-10);
  waterMesh.renderOrder=1;

  var bg=new THREE.Group();bg.name='boat';
  var hs=new THREE.Shape();

    [117.0,90.1,19.1],[96.0,42.0,24.1],[120.0,57.4,22.2],[114.0,81.1,20.7],
    [96.1,50.6,20.0],[-24.0,-36.0,23.8],[-45.2,-38.9,23.8],[105.0,47.9,19.0],
    [-123.1,-66.0,20.5],[-126.2,-68.9,19.6],[-120.0,-68.9,18.6]
  ];

  var LAMPS=[
    [-84.5,-85.4,11.4],[-76.4,-59.0,11.1],[76.6,-53.6,10.9],[-47.9,-67.6,10.8],
    [1.4,-49.6,10.5],[49.4,-61.8,10.5],[-115.2,-70.8,10.4],[7.8,-61.7,10.0],
    [-122.2,-50.3,9.7],[17.6,-4.3,9.1],[-24.8,-40.6,8.8],[-68.0,-85.4,8.2],
    [118.9,49.4,8.0],[-118.8,-49.3,7.8],[73.4,-52.6,7.4],[100.7,40.3,7.3],
    [66.4,-7.8,7.3],[-124.9,-55.5,7.3],[-40.6,-31.7,7.2]
  ];

  // Shared tree geometries (instanced look with slight variation)
  var trunkGeo=new THREE.CylinderGeometry(0.15,0.25,1,6);
  var canopyGeo=new THREE.SphereGeometry(1,7,5);
  var trunkMat=new THREE.MeshLambertMaterial({color:0x4a3520});
  // Several canopy shades for variety
  var canopyMats=[
    new THREE.MeshLambertMaterial({color:0x2d5a1e}),
    new THREE.MeshLambertMaterial({color:0x3a6b28}),
    new THREE.MeshLambertMaterial({color:0x1e4a15}),
    new THREE.MeshLambertMaterial({color:0x2a5520})
  ];

  TREES.forEach(function(t,i){
    var x=t[0],z=t[1],h=t[2];
    var groundY=getHeight(x,z);
    var treeH=h-groundY; // actual tree height above ground
    if(treeH<2) return; // skip tiny ones
    var trunkH=treeH*0.45;
    var canopyR=treeH*0.15+Math.random()*0.3;

    // Trunk
    var trunk=new THREE.Mesh(trunkGeo,trunkMat);
    trunk.position.set(x,groundY+trunkH/2,z);
    trunk.scale.set(1,trunkH,1);
    scene.add(trunk);

    // Canopy
    var mat=canopyMats[i%canopyMats.length];
    var c1=new THREE.Mesh(canopyGeo,mat);
    c1.position.set(x,groundY+trunkH+canopyR*0.7,z);
    c1.scale.set(canopyR,canopyR*0.8,canopyR);
    scene.add(c1);

    // Second smaller canopy for fuller look
    if(treeH>8){
      var c2=new THREE.Mesh(canopyGeo,mat);
      var ox=(Math.random()-0.5)*canopyR*0.5;
      var oz=(Math.random()-0.5)*canopyR*0.5;
      c2.position.set(x+ox,groundY+trunkH+canopyR*0.3,z+oz);
      c2.scale.set(canopyR*0.7,canopyR*0.6,canopyR*0.7);
      scene.add(c2);
    }
  });

  // Lamps: pole + light sphere
  var poleMat=new THREE.MeshLambertMaterial({color:0x555555});
  var lightMat=new THREE.MeshBasicMaterial({color:0xffe8a0});
  var poleGeo=new THREE.CylinderGeometry(0.06,0.08,1,5);
  var bulbGeo=new THREE.SphereGeometry(0.2,6,4);

  LAMPS.forEach(function(l){
    var x=l[0],z=l[1],h=l[2];
    var groundY=getHeight(x,z);
    var poleH=Math.min(h-groundY,5); // actual height above ground, max 5m
    if(poleH<1) return;

    var pole=new THREE.Mesh(poleGeo,poleMat);
    pole.position.set(x,groundY+poleH/2,z);
    pole.scale.set(1,poleH,1);
    scene.add(pole);

    var bulb=new THREE.Mesh(bulbGeo,lightMat);
    bulb.position.set(x,groundY+poleH+0.15,z);
    scene.add(bulb);
  });

  // ── Input ─────────────────────────────────────────────────────────
  window.addEventListener('keydown',function(e){keys[e.code]=true});
  window.addEventListener('keyup',function(e){keys[e.code]=false});
  renderer.domElement.addEventListener('click',function(){if(mode==='walk')renderer.domElement.requestPointerLock()});
  document.addEventListener('pointerlockchange',function(){locked=document.pointerLockElement===renderer.domElement;updateHUD()});
  document.addEventListener('mousemove',function(e){
    if(mode==='walk'&&locked){yaw-=e.movementX*.002;pitch=Math.max(-1.2,Math.min(1,pitch-e.movementY*.002))}
  });
  var dox=0,doy=0;
  renderer.domElement.addEventListener('mousedown',function(e){if(mode==='boat'){isDragging=true;dox=e.clientX;doy=e.clientY}});
  window.addEventListener('mouseup',function(){isDragging=false});
  window.addEventListener('mousemove',function(e){
    if(mode==='boat'&&isDragging){yaw-=(e.clientX-dox)*.003;pitch=Math.max(-.8,Math.min(.6,pitch-(e.clientY-doy)*.003));dox=e.clientX;doy=e.clientY}
  });
  var ts=null;
  renderer.domElement.addEventListener('touchstart',function(e){if(e.touches.length===1)ts={x:e.touches[0].clientX,y:e.touches[0].clientY}});
  renderer.domElement.addEventListener('touchmove',function(e){if(ts&&e.touches.length===1){yaw-=(e.touches[0].clientX-ts.x)*.004;pitch=Math.max(-.8,Math.min(.6,pitch-(e.touches[0].clientY-ts.y)*.004));ts={x:e.touches[0].clientX,y:e.touches[0].clientY}}e.preventDefault()},{passive:false});
  renderer.domElement.addEventListener('touchend',function(){ts=null});

  if(navigator.xr)navigator.xr.isSessionSupported('immersive-vr').then(function(ok){if(ok)document.getElementById('vr-btn').style.display='block'});

  document.getElementById('load-fill').style.width='100%';
  setTimeout(function(){document.getElementById('loading').style.display='none'},400);
  clock=new THREE.Clock();setMode('boat');

  renderer.setAnimationLoop(function(t2,xrFrame){
    var dt=Math.min(clock.getDelta(),.05),el=clock.elapsedTime;
    waterMesh.material.uniforms.uTime.value=el;
    scene.children.forEach(function(c){if(c.isGroup&&c.userData.speed){c.position.x+=c.userData.speed*dt;if(c.position.x>180)c.position.x=-180;if(c.position.x<-180)c.position.x=180}});
    if(mode==='boat')updateBoat(dt,el);else updateWalk(dt);
    if(!xrFrame){camera.rotation.order='YXZ';camera.rotation.y=yaw;camera.rotation.x=pitch}
    renderer.render(scene,camera);
  });

  window.addEventListener('resize',function(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
}

function getHeight(x,z){
  var gx=Math.round(x),gz=Math.round(z),best=-999;
  for(var dx=-2;dx<=2;dx++)for(var dz=-2;dz<=2;dz++){var k=(gx+dx)+','+(gz+dz);if(k in hmap&&hmap[k]>best)best=hmap[k]}
  return best>-999?best:0;
}

function updateBoat(dt,el){
  if(keys['ArrowUp']||keys['KeyW'])boatSpeed=Math.min(.06,boatSpeed+.02*dt);
  if(keys['ArrowDown']||keys['KeyS'])boatSpeed=Math.max(.003,boatSpeed-.02*dt);
  if(keys['ArrowLeft']||keys['KeyA'])boatSteer-=4*dt;
  if(keys['ArrowRight']||keys['KeyD'])boatSteer+=4*dt;
  boatSteer=Math.max(-6,Math.min(6,boatSteer));boatSteer*=.99;
  boatT+=boatSpeed*dt;if(boatT>1)boatT=0;
  var p=pathPt(boatT),d=pathDir(boatT),px=-d.z,pz=d.x;
  var bx=p.x+px*boatSteer,bz=p.z+pz*boatSteer;
  var by=0.6+Math.sin(el*1.2)*.04+Math.sin(el*.7)*.03;
  cameraRig.position.set(bx,by+.9,bz);
  var ry=Math.atan2(d.x,d.z);
  if(!isDragging){var df=ry-yaw;while(df>Math.PI)df-=2*Math.PI;while(df<-Math.PI)df+=2*Math.PI;yaw+=df*.03}
  var bo=scene.getObjectByName('boat');
  if(bo){bo.visible=true;bo.position.set(bx,by,bz);bo.rotation.y=ry;bo.rotation.x=Math.sin(el*1.2)*.02;bo.rotation.z=Math.sin(el*.9)*.015}
}

function updateWalk(dt){
  var sp=keys['ShiftLeft']||keys['ShiftRight']?14:6;
  var fw=0,rt=0;
  if(keys['KeyW']||keys['ArrowUp'])fw=1;
  if(keys['KeyS']||keys['ArrowDown'])fw=-1;
  if(keys['KeyA']||keys['ArrowLeft'])rt=-1;
  if(keys['KeyD']||keys['ArrowRight'])rt=1;
  // Camera-relative: forward is the direction camera faces (yaw only, not pitch)
  var fwdX=Math.sin(yaw), fwdZ=-Math.cos(yaw);
  var rtX=Math.cos(yaw), rtZ=Math.sin(yaw);
  cameraRig.position.x+=(fw*fwdX+rt*rtX)*sp*dt;
  cameraRig.position.z+=(fw*fwdZ+rt*rtZ)*sp*dt;
  var gy=getHeight(cameraRig.position.x,cameraRig.position.z);
  var ty=Math.max(gy,.2)+1.7;cameraRig.position.y+=(ty-cameraRig.position.y)*.2;
  var bo=scene.getObjectByName('boat');if(bo)bo.visible=false;
}

window.enterVR=function(){
  if(!navigator.xr)return;
  navigator.xr.requestSession('immersive-vr',{optionalFeatures:['local-floor','bounded-floor']}).then(function(s){
    xrSession=s;renderer.xr.setSession(s);
    ['hud','mode-toggle','crosshair','vr-btn'].forEach(function(id){document.getElementById(id).style.display='none'});
    s.addEventListener('end',function(){xrSession=null;document.getElementById('hud').style.display='';document.getElementById('mode-toggle').style.display='';document.getElementById('vr-btn').style.display='block';updateHUD()});
  });
};
</script>
