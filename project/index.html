<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reka Paka – Point Cloud Walk</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden}
#hud{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);color:#fff;font-family:monospace;font-size:13px;background:rgba(0,0,0,.55);padding:10px 22px;border-radius:24px;white-space:nowrap;backdrop-filter:blur(6px);z-index:10;border:1px solid rgba(255,255,255,.12)}
#info{position:fixed;top:16px;left:16px;color:#fff;font-family:monospace;font-size:12px;background:rgba(0,0,0,.5);padding:8px 14px;border-radius:8px;z-index:10;line-height:1.6;backdrop-filter:blur(4px)}
#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:12px;height:12px;pointer-events:none;z-index:5}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,255,255,.5)}
#crosshair::before{width:2px;height:12px;left:5px;top:0}
#crosshair::after{width:12px;height:2px;top:5px;left:0}
#loading{position:fixed;inset:0;background:#0a1520;display:flex;align-items:center;justify-content:center;flex-direction:column;color:#fff;font-family:monospace;z-index:100}
#loading .bar{width:260px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin-top:16px}
#loading .fill{height:100%;background:#4a9edd;border-radius:2px;width:0%;transition:width .3s}
#ctrls{position:fixed;top:16px;right:16px;z-index:10;display:flex;align-items:center;gap:8px;color:#fff;font-family:monospace;font-size:12px;background:rgba(0,0,0,.5);padding:8px 14px;border-radius:8px;backdrop-filter:blur(4px)}
#ctrls input{width:100px}
#ctrls button{background:none;border:1px solid rgba(255,255,255,.3);color:#fff;padding:2px 10px;border-radius:4px;cursor:pointer;font-family:monospace;font-size:12px}
#interest-panel{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);max-width:420px;width:90%;background:rgba(8,20,35,.82);border:1px solid rgba(100,180,240,.35);border-radius:14px;padding:18px 22px;color:#fff;font-family:monospace;z-index:20;backdrop-filter:blur(10px);opacity:0;pointer-events:none;transition:opacity .5s ease}
#interest-panel.visible{opacity:1}
#interest-panel .ip-tag{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#4a9edd;margin-bottom:6px}
#interest-panel .ip-title{font-size:16px;font-weight:bold;margin-bottom:8px;color:#d6eeff}
#interest-panel .ip-body{font-size:12px;line-height:1.7;color:#aac8e0}
#interest-panel .ip-close{position:absolute;top:10px;right:14px;cursor:pointer;color:rgba(255,255,255,.4);font-size:16px;line-height:1}
#interest-panel .ip-close:hover{color:#fff}
</style>
</head>
<body>
<div id="loading"><div>Loading point cloud…</div><div class="bar"><div class="fill" id="load-fill"></div></div></div>
<div id="hud">Click to lock mouse · WASD = move</div>
<div id="coords" style="position:fixed;bottom:50px;left:50%;transform:translateX(-50%);color:#0f0;font-family:monospace;font-size:14px;background:rgba(0,0,0,.7);padding:6px 16px;border-radius:8px;z-index:10">X: 0 Y: 0 Z: 0</div>
<div id="info"></div>
<div id="crosshair"></div>
<div id="ctrls">Size: <input type="range" id="pt-size" min="0.1" max="8" step="0.1" value="0.6"> <span id="pt-val">0.6</span> | <button id="shape-btn" onclick="toggleShape()">■ Square</button> <button id="edl-btn" onclick="toggleEDL()">EDL: OFF</button> <button id="fill-btn" onclick="toggleFill()">Fill: OFF</button></div>
<div id="interest-panel">
  <div class="ip-tag">Point of Interest</div>
  <div class="ip-title" id="ip-title"></div>
  <div class="ip-body" id="ip-body"></div>
  <div class="ip-close" onclick="closeInterestPanel()">✕</div>
</div>
<div id="mode-toggle" style="position:fixed;top:50px;right:16px;z-index:10;display:flex;gap:6px">
<button id="btn-walk" class="active" onclick="setMode('walk')" style="background:rgba(60,140,200,.6);color:#fff;border:1px solid rgba(100,180,240,.5);padding:8px 16px;border-radius:20px;font-size:12px;cursor:pointer;font-family:monospace;backdrop-filter:blur(6px)">🚶 Walk</button>
<button id="btn-boat" onclick="setMode('boat')" style="background:rgba(0,0,0,.5);color:#fff;border:1px solid rgba(255,255,255,.2);padding:8px 16px;border-radius:20px;font-size:12px;cursor:pointer;font-family:monospace;backdrop-filter:blur(6px)">⛵ Boat</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="fullcloud.js"></script>
<script>
(function poll(){
  if(typeof THREE==='undefined'||typeof PC_POSITIONS==='undefined'){
    document.getElementById('load-fill').style.width='30%';
    setTimeout(poll,50);return;
  }
  document.getElementById('load-fill').style.width='60%';
  setTimeout(init,50);
})();

function decode(b64){
  var bin=atob(b64),ab=new ArrayBuffer(bin.length),u8=new Uint8Array(ab);
  for(var i=0;i<bin.length;i++) u8[i]=bin.charCodeAt(i);
  return ab;
}

var renderer,scene,camera,clock;
var keys={},yaw=Math.PI,pitch=-0.1,locked=false;
var hmap={};
var edlOn=false;

function init(){
  document.getElementById('load-fill').style.width='80%';

  renderer=new THREE.WebGLRenderer({antialias:false});
  renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.autoClear=false;
  document.body.appendChild(renderer.domElement);

  scene=new THREE.Scene();

  camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,400);
  camera.position.set(30,5,-5);
  camera.rotation.order='YXZ';

  var pw=Math.round(innerWidth*Math.min(devicePixelRatio,2));
  var ph=Math.round(innerHeight*Math.min(devicePixelRatio,2));

  // ── Sky fullscreen quad ───────────────────────────────────────────
  var skyScene=new THREE.Scene();
  var skyCamera=new THREE.Camera();
  var skyMat=new THREE.ShaderMaterial({
    depthWrite:false,depthTest:false,
    uniforms:{uTime:{value:0}},
    vertexShader:'varying vec2 vUv;void main(){vUv=uv;gl_Position=vec4(position,1.0);}',
    fragmentShader:[
      'varying vec2 vUv;uniform float uTime;',
      'float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}',
      'float noise(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.0-2.0*f);',
      '  return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);}',
      'float fbm(vec2 p){float v=0.0,a=0.5;for(int i=0;i<5;i++){v+=a*noise(p);p*=2.0;a*=0.5;}return v;}',
      'void main(){',
      '  float h=vUv.y;',
      '  vec3 sky=mix(vec3(0.7,0.82,0.92),mix(vec3(0.45,0.65,0.85),vec3(0.15,0.35,0.65),smoothstep(0.4,0.9,h)),smoothstep(0.0,0.4,h));',
      '  vec2 sp=vec2(0.7,0.65);float sd=length(vUv-sp);',
      '  sky+=vec3(1,.95,.8)*.3*exp(-sd*4.)+vec3(1,.9,.7)*.08*exp(-sd*1.5);',
      '  float t=uTime*0.008;vec2 cuv=vUv*vec2(3,2)+vec2(t,0);',
      '  float c=fbm(cuv*3.0);c=smoothstep(0.35,0.65,c);',
      '  c*=smoothstep(0.0,0.3,h)*smoothstep(0.95,0.6,h);',
      '  vec3 cl=mix(vec3(.7,.75,.82),vec3(1,.98,.95),fbm(cuv*3.+vec2(.3,.2)));',
      '  sky=mix(sky,cl,c*.85);',
      '  gl_FragColor=vec4(sky,1);',
      '}'
    ].join('\n')
  });
  skyScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2),skyMat));

  // ── EDL render target (depth texture) ─────────────────────────────
  var rt=new THREE.WebGLRenderTarget(pw,ph,{
    minFilter:THREE.NearestFilter,magFilter:THREE.NearestFilter,
    format:THREE.RGBAFormat
  });
  rt.depthTexture=new THREE.DepthTexture();
  rt.depthTexture.type=THREE.UnsignedIntType;

  // ── EDL post-process quad ─────────────────────────────────────────
  var edlScene=new THREE.Scene();
  var edlCam=new THREE.Camera();
  var edlMat=new THREE.ShaderMaterial({
    depthWrite:false,depthTest:false,transparent:true,
    uniforms:{
      uColor:{value:rt.texture},
      uDepth:{value:rt.depthTexture},
      uRes:{value:new THREE.Vector2(pw,ph)},
      uNear:{value:0.1},uFar:{value:400.0},
      uStrength:{value:0.35},uOn:{value:0.0}
    },
    vertexShader:'varying vec2 vUv;void main(){vUv=uv;gl_Position=vec4(position,1.0);}',
    fragmentShader:[
      'uniform sampler2D uColor,uDepth;uniform vec2 uRes;',
      'uniform float uNear,uFar,uStrength,uOn;varying vec2 vUv;',
      'float linD(vec2 uv){float d=texture2D(uDepth,uv).r;return 2.0*uNear*uFar/(uFar+uNear-d*(uFar-uNear));}',
      'void main(){',
      '  vec4 col=texture2D(uColor,vUv);',
      '  if(col.a<0.01) discard;', // let sky show through gaps
      '  if(uOn<0.5){gl_FragColor=col;return;}',
      '  float ld=log2(linD(vUv));',
      '  float r=1.5;vec2 px=r/uRes;',
      '  float e=0.0;',
      '  e+=max(0.,ld-log2(linD(vUv+vec2(px.x,0))));',
      '  e+=max(0.,ld-log2(linD(vUv-vec2(px.x,0))));',
      '  e+=max(0.,ld-log2(linD(vUv+vec2(0,px.y))));',
      '  e+=max(0.,ld-log2(linD(vUv-vec2(0,px.y))));',
      '  e+=max(0.,ld-log2(linD(vUv+px*.707)));',
      '  e+=max(0.,ld-log2(linD(vUv+vec2(-px.x,px.y)*.707)));',
      '  e+=max(0.,ld-log2(linD(vUv+vec2(px.x,-px.y)*.707)));',
      '  e+=max(0.,ld-log2(linD(vUv-px*.707)));',
      '  e/=8.0;',
      '  col.rgb*=exp(-e*300.0*uStrength);',
      '  gl_FragColor=col;',
      '}'
    ].join('\n')
  });
  edlScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2),edlMat));

  // ── Point cloud ───────────────────────────────────────────────────
  var positions=new Float32Array(decode(PC_POSITIONS));
  var colBytes=new Uint8Array(decode(PC_COLORS));
  var n=PC_COUNT;

  var colors=new Float32Array(n*3);
  for(var i=0;i<n;i++){
    colors[i*3]=colBytes[i*3]/255;
    colors[i*3+1]=colBytes[i*3+1]/255;
    colors[i*3+2]=colBytes[i*3+2]/255;
    var px=positions[i*3],py=positions[i*3+1],pz=positions[i*3+2];
    if(py<8){var gx=Math.round(px),gz=Math.round(pz),key=gx+','+gz;
      if(!(key in hmap)||py>hmap[key]) hmap[key]=py;}
  }

  var geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(positions,3));
  geo.setAttribute('color',new THREE.BufferAttribute(colors,3));

  var mat=new THREE.ShaderMaterial({
    uniforms:{uSize:{value:0.6},uScale:{value:ph/2.0},uRound:{value:0.0}},
    vertexShader:[
      'attribute vec3 color;varying vec3 vColor;uniform float uSize,uScale;',
      'void main(){vColor=color;vec4 mv=modelViewMatrix*vec4(position,1.0);',
      'gl_PointSize=clamp(uSize*uScale/(-mv.z),1.0,64.0);gl_Position=projectionMatrix*mv;}'
    ].join('\n'),
    fragmentShader:[
      'varying vec3 vColor;uniform float uRound;',
      'void main(){',
      '  if(uRound>0.5){vec2 c=gl_PointCoord*2.0-1.0;if(dot(c,c)>1.0) discard;}',
      '  gl_FragColor=vec4(vColor,1.0);',
      '}'
    ].join('\n'),
    transparent:false,depthWrite:true
  });

  scene.add(new THREE.Points(geo,mat));

  // ── Ground fill mesh (plugs holes at/below surface level) ─────────
  // Pre-compute average ground color per grid cell
  var colorGrid={};
  for(var i=0;i<n;i++){
    var px=positions[i*3],py=positions[i*3+1],pz=positions[i*3+2];
    if(py<8){
      var gx=Math.round(px),gz=Math.round(pz),key=gx+','+gz;
      if(!colorGrid[key]) colorGrid[key]={r:0,g:0,b:0,c:0};
      var cg=colorGrid[key];
      cg.r+=colBytes[i*3];cg.g+=colBytes[i*3+1];cg.b+=colBytes[i*3+2];cg.c++;
    }
  }

  var fillVerts=[],fillCols=[],fillFaces=[],fillMap={},fi=0;
  var hmapKeys=Object.keys(hmap);
  hmapKeys.forEach(function(key){
    var p=key.split(',');
    var gx=parseInt(p[0]),gz=parseInt(p[1]),gy=hmap[key];
    if(gy>6) return; // skip tree canopy height
    fillMap[key]=fi;
    fillVerts.push(gx,gy-0.05,gz);
    var cg=colorGrid[key];
    if(cg&&cg.c>0) fillCols.push(cg.r/cg.c/255, cg.g/cg.c/255, cg.b/cg.c/255);
    else fillCols.push(0.45,0.43,0.4);
    fi++;
  });

  hmapKeys.forEach(function(key){
    if(!(key in fillMap)) return;
    var p=key.split(',');
    var gx=parseInt(p[0]),gz=parseInt(p[1]);
    var k10=(gx+1)+','+gz, k01=gx+','+(gz+1), k11=(gx+1)+','+(gz+1);
    if(key in fillMap && k10 in fillMap && k01 in fillMap)
      fillFaces.push(fillMap[key],fillMap[k10],fillMap[k01]);
    if(k10 in fillMap && k11 in fillMap && k01 in fillMap)
      fillFaces.push(fillMap[k10],fillMap[k11],fillMap[k01]);
  });

  var fillMeshObj=null;
  if(fillFaces.length>0){
    var fg=new THREE.BufferGeometry();
    fg.setAttribute('position',new THREE.BufferAttribute(new Float32Array(fillVerts),3));
    fg.setAttribute('color',new THREE.BufferAttribute(new Float32Array(fillCols),3));
    fg.setIndex(new THREE.BufferAttribute(new Uint32Array(fillFaces),1));
    fg.computeVertexNormals();
    fillMeshObj=new THREE.Mesh(fg,new THREE.MeshBasicMaterial({vertexColors:true,side:THREE.DoubleSide}));
    fillMeshObj.visible=false;
    scene.add(fillMeshObj);
  }
  window.toggleFill=function(){
    if(fillMeshObj){fillMeshObj.visible=!fillMeshObj.visible;
    document.getElementById('fill-btn').textContent='Fill: '+(fillMeshObj.visible?'ON':'OFF');}
  };

  // ── River path (from terrain analysis) ────────────────────────────
  // Boat ride path: from bridge at (-141,-75) upstream to promenade end (80,16)
  // Reversed from existing river data + trimmed to match start/end
  // Boat ride path - properly equal-distance sampled
  var waypoints=[
    {x:-141,z:-75},
    {x:-86.5,z:-68},
    {x:-41,z:-54},
    {x:-15.5,z:-42.5},
    {x:20,z:-22},
    {x:80,z:16}
  ];
  // Dense linear interpolation
  var rawPath=[];
  for(var wi=0;wi<waypoints.length-1;wi++){
    var a=waypoints[wi],b=waypoints[wi+1];
    var dx=b.x-a.x,dz=b.z-a.z;
    var segLen=Math.sqrt(dx*dx+dz*dz);
    var steps=Math.max(10,Math.round(segLen)); // ~1 point per meter
    for(var s=0;s<steps;s++){
      var t=s/steps;
      rawPath.push({x:a.x+dx*t, z:a.z+dz*t});
    }
  }
  rawPath.push(waypoints[waypoints.length-1]);

  // Compute cumulative distance for each rawPath point
  var cumDist=[0];
  for(var i=1;i<rawPath.length;i++){
    var dx=rawPath[i].x-rawPath[i-1].x,dz=rawPath[i].z-rawPath[i-1].z;
    cumDist.push(cumDist[i-1]+Math.sqrt(dx*dx+dz*dz));
  }
  var totalDist=cumDist[cumDist.length-1];

  // Resample at exactly equal distances
  var numPoints=150;
  var RP=[];
  for(var i=0;i<=numPoints;i++){
    var targetDist=i/numPoints*totalDist;
    // Find the two rawPath points that straddle this distance
    var j=0;
    while(j<cumDist.length-1 && cumDist[j+1]<targetDist) j++;
    if(j>=rawPath.length-1){RP.push(rawPath[rawPath.length-1]);continue;}
    var segStart=cumDist[j],segEnd=cumDist[j+1];
    var f=(segEnd>segStart)?(targetDist-segStart)/(segEnd-segStart):0;
    RP.push({
      x:rawPath[j].x+(rawPath[j+1].x-rawPath[j].x)*f,
      z:rawPath[j].z+(rawPath[j+1].z-rawPath[j].z)*f
    });
  }

  var WATER_Y=0.5;
  var mode='walk';
  var boatT=0,boatAutoSpeed=0.025; // half speed
  var boatX=-141,boatZ=-75,boatYaw=Math.PI*1.4;
  var boatAuto=true; // automatic ride by default

  // ── Interest points ───────────────────────────────────────────────
  var interestPoints=[
    {
      t:0.18,
      title:'Velenje – City in the Park',
      body:'Velenje was built from scratch in the 1950s as a model socialist new town, planned around the coal-mining industry of the Šaleška Valley. Its ambitious urban design earned it the nickname <em>Mesto v parku</em> — "City in the Park" — for integrating extensive green space directly into the city fabric. At its peak, the Velenje coal mine was one of the largest in the former Yugoslavia.'
    },
    {
      t:0.55,
      title:'Paka Promenade',
      body:'The riverside promenade stretching along this section of the Paka was redeveloped as part of Velenje\'s urban renewal effort, transforming an overgrown riverbank into a continuous recreational corridor. It connects the city centre to the lake area and is popular with cyclists, joggers, and families — one of the more pleasant examples of post-industrial riverfront regeneration in Slovenia.'
    },
    {
      t:0.87,
      title:'Šaleška Valley & the Mining Lakes',
      body:'The Paka flows through the Šaleška Valley, a landscape shaped over decades by underground coal extraction. Ground subsidence from the mines caused the earth to sink, gradually forming three artificial lakes: Velenje, Šoštanj, and Družmirje. What was once farmland is now a chain of lakes used for recreation — an accidental geography born from industry.'
    }
  ];
  var ipShown=[];
  var ipActive=false;
  var ipTimer=null;

  var ipPanel=document.getElementById('interest-panel');
  var ipTitle=document.getElementById('ip-title');
  var ipBody=document.getElementById('ip-body');

  window.closeInterestPanel=function(){
    ipPanel.classList.remove('visible');
    ipActive=false;
    if(ipTimer){clearTimeout(ipTimer);ipTimer=null;}
  };

  function showInterestPoint(ip){
    ipActive=true;
    ipTitle.textContent=ip.title;
    ipBody.innerHTML=ip.body;
    ipPanel.classList.add('visible');
    if(ipTimer) clearTimeout(ipTimer);
    ipTimer=setTimeout(window.closeInterestPanel, 12000);
  }

  function pathPt(t){
    t=Math.max(0,Math.min(1,t));
    var idx=t*(RP.length-1),i0=Math.floor(idx),i1=Math.min(i0+1,RP.length-1),f=idx-i0;
    return{x:RP[i0].x*(1-f)+RP[i1].x*f, z:RP[i0].z*(1-f)+RP[i1].z*f};
  }
  function pathDir(t){
    var a=pathPt(Math.max(0,t-.01)),b=pathPt(Math.min(1,t+.01));
    var dx=b.x-a.x,dz=b.z-a.z,l=Math.sqrt(dx*dx+dz*dz)||1;
    return{x:dx/l,z:dz/l};
  }

  // ── Water plane ───────────────────────────────────────────────────
  var waterNormTex=new THREE.TextureLoader().load('waternormals.jpg');
  waterNormTex.wrapS=waterNormTex.wrapT=THREE.RepeatWrapping;

  var waterMat=new THREE.ShaderMaterial({
    transparent:true,
    uniforms:{
      uTime:{value:0},uNormal:{value:waterNormTex},
      uWaterColor:{value:new THREE.Color(0x0d4f5c)},
      uDeepColor:{value:new THREE.Color(0x062a33)},
      uSkyColor:{value:new THREE.Color(0x6aabbf)},
      uSunDir:{value:new THREE.Vector3(0.5,0.7,0.3).normalize()}
    },
    vertexShader:[
      'uniform float uTime;varying vec2 vUv;varying vec3 vWP;varying float vW;',
      'void main(){vUv=uv;vec3 p=position;',
      'float w=0.0;',
      'vW=w;vWP=(modelMatrix*vec4(p,1.)).xyz;',
      'gl_Position=projectionMatrix*modelViewMatrix*vec4(p,1.);}'
    ].join('\n'),
    fragmentShader:[
      'uniform float uTime;uniform sampler2D uNormal;',
      'uniform vec3 uWaterColor,uDeepColor,uSkyColor,uSunDir;',
      'varying vec2 vUv;varying vec3 vWP;varying float vW;',
      'void main(){',
      '  vec2 u1=vWP.xz*.04+vec2(uTime*.02,uTime*.015);',
      '  vec2 u2=vWP.xz*.06+vec2(-uTime*.015,uTime*.025);',
      '  vec3 n=normalize(vec3((texture2D(uNormal,u1).xy+texture2D(uNormal,u2).xy-1.)*.5,1.));',
      '  float diff=max(dot(n,uSunDir),0.);',
      '  vec3 vd=normalize(cameraPosition-vWP);',
      '  float spec=pow(max(dot(n,normalize(uSunDir+vd)),0.),120.)*.6;',
      '  float fres=pow(1.-max(dot(vd,vec3(0,1,0)),0.),3.);',
      '  fres=clamp(fres,.15,.8);',
      '  vec3 c=mix(uDeepColor,uWaterColor,diff*.6+.4);',
      '  c=mix(c,uSkyColor,fres*.4);c+=vec3(1,.95,.85)*spec;',
      '  c+=vec3(.12,.16,.18)*smoothstep(.06,.12,vW);',
      '  gl_FragColor=vec4(c,.92);',
      '}'
    ].join('\n')
  });

  var waterGeo=new THREE.PlaneGeometry(350,300,100,80);
  waterGeo.rotateX(-Math.PI/2);
  var waterMesh=new THREE.Mesh(waterGeo,waterMat);
  waterMesh.position.set(0,WATER_Y,-10);
  waterMesh.renderOrder=2;
  scene.add(waterMesh);

  // ── Boat deck (flat plane under player) ─────────────────────────────
  var deckGeo=new THREE.PlaneGeometry(2.5,4);
  deckGeo.rotateX(-Math.PI/2);
  var deckMat=new THREE.MeshBasicMaterial({color:0x6b4226,side:THREE.DoubleSide});
  // Add plank lines
  var deckGroup=new THREE.Group();deckGroup.name='boat';deckGroup.visible=false;
  deckGroup.add(new THREE.Mesh(deckGeo,deckMat));
  // Plank lines
  var plankMat=new THREE.MeshBasicMaterial({color:0x4a2a15});
  for(var pi=-1;pi<=1;pi++){
    var plank=new THREE.Mesh(new THREE.PlaneGeometry(0.03,3.8),plankMat);
    plank.rotateX(-Math.PI/2);plank.position.set(pi*0.6,0.005,0);
    deckGroup.add(plank);
  }
  // Railing edges
  var railMat=new THREE.MeshBasicMaterial({color:0x3a1a0a});
  var railL=new THREE.Mesh(new THREE.BoxGeometry(0.06,0.15,4),railMat);
  railL.position.set(-1.25,0.08,0);deckGroup.add(railL);
  var railR=new THREE.Mesh(new THREE.BoxGeometry(0.06,0.15,4),railMat);
  railR.position.set(1.25,0.08,0);deckGroup.add(railR);
  scene.add(deckGroup);

  // ── Mode switching ────────────────────────────────────────────────
  window.setMode=function(m){
    mode=m;
    var bw=document.getElementById('btn-walk'),bb=document.getElementById('btn-boat');
    bw.style.background=m==='walk'?'rgba(60,140,200,.6)':'rgba(0,0,0,.5)';
    bw.style.borderColor=m==='walk'?'rgba(100,180,240,.5)':'rgba(255,255,255,.2)';
    bb.style.background=m==='boat'?'rgba(60,140,200,.6)':'rgba(0,0,0,.5)';
    bb.style.borderColor=m==='boat'?'rgba(100,180,240,.5)':'rgba(255,255,255,.2)';
    document.getElementById('crosshair').style.display=m==='walk'?'':'none';
    if(m==='boat'){
      boatT=0;boatAuto=true;ipShown=[];window.closeInterestPanel();
      deckGroup.visible=true;
      var p0=pathPt(0),p1=pathPt(0.02);
      yaw=Math.atan2(-(p1.x-p0.x),-(p1.z-p0.z));pitch=-.05;
      document.getElementById('hud').textContent='Auto ride · Click to lock mouse · Mouse = look';
    } else {
      deckGroup.visible=false;
      var sx=30,sz=-5;
      camera.position.set(sx,getHeight(sx,sz)+1.7,sz);
      yaw=Math.PI*0.5;pitch=0;
      document.getElementById('hud').textContent='Click to lock mouse · WASD = move';
    }
  };

  // Toggles
  window.toggleShape=function(){
    var r=mat.uniforms.uRound;r.value=r.value>0.5?0:1;
    document.getElementById('shape-btn').textContent=r.value>0.5?'● Round':'■ Square';
  };
  window.toggleEDL=function(){
    edlOn=!edlOn;edlMat.uniforms.uOn.value=edlOn?1:0;
    document.getElementById('edl-btn').textContent='EDL: '+(edlOn?'ON':'OFF');
  };

  var slider=document.getElementById('pt-size'),valSpan=document.getElementById('pt-val');
  slider.addEventListener('input',function(){mat.uniforms.uSize.value=parseFloat(slider.value);valSpan.textContent=slider.value});

  document.getElementById('info').innerHTML=n.toLocaleString()+' points<br>Full LiDAR – Reka Paka, Velenje';

  // ── Controls ──────────────────────────────────────────────────────
  window.addEventListener('keydown',function(e){keys[e.code]=true});
  window.addEventListener('keyup',function(e){keys[e.code]=false});
  renderer.domElement.addEventListener('click',function(){renderer.domElement.requestPointerLock()});
  document.addEventListener('pointerlockchange',function(){
    locked=document.pointerLockElement===renderer.domElement;
    if(mode==='walk')
      document.getElementById('hud').textContent=locked?'WASD = move · Shift = run · Mouse = look · ESC = unlock':'Click to lock mouse · WASD = move';
    else
      document.getElementById('hud').textContent=locked?'Auto ride · Mouse = look · ESC = unlock':'Auto ride · Click to look around';
  });
  document.addEventListener('mousemove',function(e){if(!locked)return;yaw-=e.movementX*.002;pitch=Math.max(-1.4,Math.min(1.2,pitch-e.movementY*.002))});
  var hudVisible=true;
  var hudEls=['hud','info','coords','ctrls','mode-toggle'];
  window.toggleHUD=function(){
    hudVisible=!hudVisible;
    hudEls.forEach(function(id){document.getElementById(id).style.display=hudVisible?'':'none';});
  };
  document.addEventListener('keydown',function(e){
    if(e.code==='KeyX') window.closeInterestPanel();
    if(e.code==='KeyH') window.toggleHUD();
  });

  document.getElementById('load-fill').style.width='100%';
  setTimeout(function(){document.getElementById('loading').style.display='none'},400);
  clock=new THREE.Clock();

  // ── Render loop ───────────────────────────────────────────────────
  renderer.setAnimationLoop(function(){
    var dt=Math.min(clock.getDelta(),0.05);
    var elapsed=clock.elapsedTime;
    skyMat.uniforms.uTime.value=elapsed;
    waterMat.uniforms.uTime.value=elapsed;

    if(mode==='walk'){
      var sp=keys['ShiftLeft']||keys['ShiftRight']?20:8,fw=0,rt2=0;
      if(keys['KeyW']||keys['ArrowUp'])fw=1;if(keys['KeyS']||keys['ArrowDown'])fw=-1;
      if(keys['KeyA']||keys['ArrowLeft'])rt2=-1;if(keys['KeyD']||keys['ArrowRight'])rt2=1;
      var fx=-Math.sin(yaw),fz=-Math.cos(yaw);
      var rx=Math.cos(yaw),rz=-Math.sin(yaw);
      camera.position.x+=(fw*fx+rt2*rx)*sp*dt;
      camera.position.z+=(fw*fz+rt2*rz)*sp*dt;
      if(keys['Space']||keys['KeyQ'])camera.position.y+=sp*dt;
      if(keys['KeyE']||keys['KeyC'])camera.position.y-=sp*dt;
      if(!keys['Space']&&!keys['KeyQ']&&!keys['KeyE']&&!keys['KeyC']){
        var gy=getHeight(camera.position.x,camera.position.z);
        camera.position.y+=(gy+1.7-camera.position.y)*0.1;
      }
    } else {
      // Boat mode - automatic ride along river path
      if(boatAuto && boatT<1.0){
        boatT+=boatAutoSpeed*dt;
        if(boatT>=1.0){boatT=1.0;boatAuto=false;
          document.getElementById('hud').textContent='Ride complete! Click Walk to explore';
        }
        // Check interest points
        for(var ipi=0;ipi<interestPoints.length;ipi++){
          if(ipShown.indexOf(ipi)<0 && boatT>=interestPoints[ipi].t){
            ipShown.push(ipi);
            showInterestPoint(interestPoints[ipi]);
          }
        }
      }

      var p=pathPt(boatT);
      var d=pathDir(boatT);
      var by=WATER_Y+0.15;

      camera.position.set(p.x,by+0.8,p.z);

      // Smoothly face direction of travel
      var targetYaw=Math.atan2(-d.x,-d.z);
      var df=targetYaw-yaw;
      while(df>Math.PI)df-=2*Math.PI;
      while(df<-Math.PI)df+=2*Math.PI;
      if(!locked) yaw+=df*0.05; // only auto-rotate when mouse not locked

      deckGroup.position.set(p.x,by,p.z);
      deckGroup.rotation.y=targetYaw+Math.PI;
    }

    camera.rotation.order='YXZ';camera.rotation.y=yaw;camera.rotation.x=pitch;

    document.getElementById('coords').textContent='X: '+camera.position.x.toFixed(1)+' Y: '+camera.position.y.toFixed(1)+' Z: '+camera.position.z.toFixed(1);

    renderer.clear();
    renderer.render(skyScene,skyCamera);
    renderer.setRenderTarget(rt);
    renderer.setClearColor(0x000000,0);
    renderer.clear();
    renderer.render(scene,camera);
    renderer.setRenderTarget(null);
    renderer.render(edlScene,edlCam);
  });

  window.addEventListener('resize',function(){
    pw=Math.round(innerWidth*Math.min(devicePixelRatio,2));
    ph=Math.round(innerHeight*Math.min(devicePixelRatio,2));
    camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
    rt.setSize(pw,ph);
    edlMat.uniforms.uRes.value.set(pw,ph);
    mat.uniforms.uScale.value=ph/2;
  });
}

function getHeight(x,z){
  var gx=Math.round(x),gz=Math.round(z),best=-999;
  for(var dx=-2;dx<=2;dx++)for(var dz=-2;dz<=2;dz++){var k=(gx+dx)+','+(gz+dz);if(k in hmap&&hmap[k]>best)best=hmap[k];}
  return best>-999?best:2;
}
</script>
</body>
</html>
